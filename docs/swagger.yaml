basePath: /
definitions:
  agent.RegisterResponse:
    properties:
      agent_id:
        type: string
      grpc_addr:
        type: string
      token:
        type: string
    type: object
  cmd_core.registerRequest:
    type: object
  main.createTaskRequest:
    properties:
      payload:
        type: object
      robotId:
        type: string
      type:
        type: string
    type: object
  main.createTaskResponse:
    properties:
      task_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: VantageOS backend — agentsdk registry and task management.
  title: VantageOS Core API
  version: "1.0"
paths:
  /agents/register:
    post:
      consumes:
      - application/json
      description: |-
        Called by a physical agent on boot to register its identity and skills.
        The request must include a pre-shared device API key as a Bearer token.
      parameters:
      - description: Bearer <device-api-key>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Agent registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cmd_core.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent.RegisterResponse'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Register an agentsdk
      tags:
      - agents
  /api/v1/tasks:
    post:
      consumes:
      - application/json
      description: Dispatches a task to a named agentsdk. The agentsdk must be online and
        idle.
      parameters:
      - description: Task payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.createTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.createTaskResponse'
        "400":
          description: bad request
          schema:
            type: string
        "409":
          description: agentsdk offline or busy
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Create a task
      tags:
      - tasks
swagger: "2.0"
