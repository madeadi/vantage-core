syntax = "proto3";

package mission.v1;

option go_package = "vantageos-core/proto/mission/v1;missionv1";

service MissionService {
    rpc StreamMission(stream MissionClientMessage) returns (stream MissionServerMessage);
}


message MissionClientMessage {
    oneof payload {
        CreateTask   create_task = 1;
        AbortTask    abort_task = 2;
    }
}

message MissionServerMessage {
    oneof payload {
        TaskStatusUpdate task_status_update = 1;
        CreateTaskResponse create_task_response = 2;
    }
}

message MissionContext {
    bytes context = 1;
}

message TaskContext {
    string id = 1; // server generated task id
    bytes output = 2; // optional execution results
}

message TaskRequirements {
    string agent_id  = 1; // mission pins a specific agent
}

enum MissionTaskStatus {
    MISSION_TASK_STATUS_UNSPECIFIED = 0;
    MISSION_TASK_STATUS_ACCEPTED    = 1;
    MISSION_TASK_STATUS_IN_PROGRESS = 2;
    MISSION_TASK_STATUS_COMPLETED   = 3;
    MISSION_TASK_STATUS_FAILED      = 4;
}

// Client messages
message CreateTask {
    // Task
    string type = 1; // e.g. "GO_TO", "GO_HOME"
    bytes payload = 2; // will match task schema payload

    // To be received back from the server during status update
    MissionContext mission_context = 3;

    // Requirements for the task to be executed, e.g. a specific agent or a specific robot type
    TaskRequirements requirement = 4;
}

message AbortTask {
    string task_id = 1;
}

// server messages
message CreateTaskResponse {
    MissionContext mission_context = 1;
    MissionTaskStatus status = 2;
    string task_id = 3;
}

message TaskStatusUpdate {
    MissionContext mission_context = 1;
    MissionTaskStatus status = 2;
    TaskContext task_context = 3;
    string message = 4; // optional message from the server
}